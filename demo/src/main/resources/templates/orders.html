<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${'Đơn hàng - ' + siteDisplayName}">Đơn hàng - MiniWear Kids</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body class="home-page">
<header th:replace="~{fragments/site-header :: siteHeader}"></header>

<main class="pb-5">
    <div class="container pt-4">
        <div class="surface-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <div>
                    <div class="section-kicker"><i class="bi bi-receipt-cutoff"></i> Đơn hàng</div>
                    <h1 class="section-title mb-0">Lịch sử đơn hàng</h1>
                </div>
                <a th:href="@{/shop}" class="link-more"><i class="bi bi-arrow-left"></i> Tiếp tục mua</a>
            </div>
            <div id="ordersRealtimeNotice" class="mb-3"></div>

            <div th:if="${orderPage == null || orderPage.totalElements == 0}" class="text-center py-5">
                <i class="bi bi-inbox" style="font-size:3rem;color:#ddd;"></i>
                <p class="mt-2 text-muted">Bạn chưa có đơn hàng nào.</p>
                <a th:href="@{/shop}" class="btn btn-main">Mua sắm ngay</a>
            </div>

            <div th:unless="${orderPage == null || orderPage.totalElements == 0}">
                <div class="order-list">
                    <div class="order-card" th:each="order : ${orderPage.content}"
                         th:attr="data-order-id=${order.id},data-bank-transfer=${order.bankTransfer},data-order-status=${order.status},data-payment-confirmed=${order.paymentConfirmed}">
                        <div class="order-card-head">
                            <div>
                                <strong th:text="'#' + ${order.orderCode}">MWK123</strong>
                                <span class="badge rounded-pill ms-2 order-status-badge" th:classappend="'text-bg-' + ${order.statusColor}" th:text="${order.statusLabel}">Chờ xác nhận</span>
                            </div>
                            <span class="text-muted small" th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</span>
                        </div>
                        <div class="order-card-body">
                            <div class="order-card-items">
                                <div th:each="item : ${order.items}" class="order-mini-item">
                                    <img th:src="${item.productImage != null ? item.productImage : '/assets/sales/sale1.webp'}" th:alt="${item.productName}">
                                    <div>
                                        <span th:text="${item.productName}">SP</span>
                                        <small class="text-muted" th:text="'x' + ${item.quantity}">x1</small>
                                    </div>
                                </div>
                            </div>
                            <div class="order-card-total">
                                <span>Tổng: </span>
                                <strong th:text="${order.formattedTotal}">0đ</strong>
                            </div>
                        </div>
                        <div class="order-card-actions">
                            <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-main">Xem chi tiết</a>
                        </div>
                    </div>
                </div>

                <nav th:if="${orderPage.totalPages > 1}" class="mt-4">
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${orderPage.first} ? ' disabled' : ''">
                            <a class="page-link" th:href="@{/orders(page=${orderPage.number - 1})}">Trước</a>
                        </li>
                        <li class="page-item disabled">
                            <span class="page-link" th:text="${orderPage.number + 1 + ' / ' + orderPage.totalPages}">1 / 1</span>
                        </li>
                        <li class="page-item" th:classappend="${orderPage.last} ? ' disabled' : ''">
                            <a class="page-link" th:href="@{/orders(page=${orderPage.number + 1})}">Sau</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/site-footer :: siteFooter}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const ordersRealtimeNotice = document.getElementById('ordersRealtimeNotice');
    const orderCards = Array.from(document.querySelectorAll('.order-card[data-order-id]'));

    function showOrdersRealtimeNotice(message) {
        if (!ordersRealtimeNotice) {
            return;
        }

        const alert = document.createElement('div');
        alert.className = 'alert alert-success mb-2';
        alert.textContent = message;
        ordersRealtimeNotice.prepend(alert);

        window.setTimeout(() => alert.remove(), 5500);
    }

    function refreshOrderCard(card, payload) {
        if (!card || !payload) {
            return;
        }

        const badge = card.querySelector('.order-status-badge');
        if (badge) {
            badge.className = 'badge rounded-pill ms-2 order-status-badge text-bg-' + (payload.statusColor || 'secondary');
            badge.textContent = payload.statusLabel || payload.status;
        }

        card.dataset.orderStatus = payload.status || card.dataset.orderStatus;
        card.dataset.paymentConfirmed = String(payload.paymentConfirmed === true);
    }

    async function monitorOrdersRealtime() {
        const watchingCards = orderCards.filter((card) => {
            const isBankTransfer = card.dataset.bankTransfer === 'true';
            const waitingPayment = card.dataset.orderStatus === 'WAITING_PAYMENT';
            const alreadyConfirmed = card.dataset.paymentConfirmed === 'true';
            return isBankTransfer && waitingPayment && !alreadyConfirmed;
        });

        if (!watchingCards.length) {
            return;
        }

        const notifiedOrders = new Set();

        const checkEachOrder = async () => {
            for (const card of watchingCards) {
                if (card.dataset.paymentConfirmed === 'true') {
                    continue;
                }

                const orderId = card.dataset.orderId;
                if (!orderId) {
                    continue;
                }

                try {
                    const response = await fetch('/orders/' + orderId + '/payment-status', {
                        headers: { 'X-Requested-With': 'XMLHttpRequest' }
                    });

                    if (!response.ok) {
                        continue;
                    }

                    const payload = await response.json();
                    if (!payload || payload.success !== true) {
                        continue;
                    }

                    const previousStatus = card.dataset.orderStatus;
                    refreshOrderCard(card, payload);

                    if (payload.paymentConfirmed === true && !notifiedOrders.has(orderId)) {
                        notifiedOrders.add(orderId);
                        showOrdersRealtimeNotice('Đơn hàng #' + payload.orderCode + ' đã thanh toán thành công. Trạng thái vừa được cập nhật.');
                    } else if (previousStatus !== payload.status) {
                        showOrdersRealtimeNotice('Đơn hàng #' + payload.orderCode + ' đã cập nhật trạng thái: ' + (payload.statusLabel || payload.status));
                    }
                } catch (error) {
                    // Ignore transient network errors and continue polling.
                }
            }
        };

        window.setInterval(checkEachOrder, 3500);
        checkEachOrder();
    }

    monitorOrdersRealtime();
</script>
</body>
</html>
