<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${'Thông báo - ' + siteDisplayName}">Thông báo - MiniWear Kids</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/base.css}">
</head>
<body>
<header th:replace="~{fragments/site-header :: siteHeader}"></header>

<main class="py-4">
    <div class="container notifications-shell">
        <section class="notifications-hero surface-card p-4">
            <div>
                <span class="section-kicker"><i class="bi bi-bell-fill"></i> Thông báo</span>
                <h1 class="section-title mb-1">Toàn bộ thông báo của bạn</h1>
                <p class="section-note mb-0">Thông báo mới nhất được ưu tiên hiển thị trước. Mỗi thông báo chỉ tồn tại tối đa 30 ngày.</p>
            </div>
            <div class="notification-hero-actions">
                <form th:action="@{/notifications/mark-all-read}" method="post">
                    <input type="hidden" name="authCsrfToken" th:value="${authCsrfToken}">
                    <button class="btn btn-outline-main" type="submit"><i class="bi bi-check2-all me-1"></i>Đọc tất cả</button>
                </form>
                <form th:action="@{/notifications/delete-all}" method="post" onsubmit="return confirm('Xóa tất cả thông báo?');">
                    <input type="hidden" name="authCsrfToken" th:value="${authCsrfToken}">
                    <button class="btn btn-main" type="submit"><i class="bi bi-trash3 me-1"></i>Xóa tất cả</button>
                </form>
            </div>
        </section>

        <div th:if="${notificationSuccess}" class="alert alert-success mt-3" th:text="${notificationSuccess}"></div>

        <section class="surface-card p-3 p-md-4 mt-3">
            <form th:action="@{/notifications/delete-selected}" method="post">
                <input type="hidden" name="authCsrfToken" th:value="${authCsrfToken}">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                    <div class="text-muted small">Chọn thông báo cần xóa rồi bấm nút bên dưới.</div>
                    <button type="submit" class="btn btn-outline-main"><i class="bi bi-x-lg me-1"></i>Xóa đã chọn</button>
                </div>

                <div class="notification-list">
                    <div th:if="${notificationPage == null || notificationPage.totalElements == 0}" class="text-center text-muted py-5">
                        Chưa có thông báo nào.
                    </div>

                    <article class="notification-row" th:each="notification : ${notificationPage.content}" th:classappend="${notification.isUnread()} ? ' unread' : ''">
                        <div class="form-check notification-select">
                            <input class="form-check-input" type="checkbox" name="notificationIds" th:value="${notification.id}">
                        </div>
                        <a class="notification-link" th:href="@{/notifications/{id}/open(id=${notification.id})}">
                            <div class="d-flex justify-content-between gap-3 flex-wrap">
                                <strong th:text="${notification.title}">Tiêu đề</strong>
                                <small class="text-muted" th:text="${notification.formattedTime}">01/01 00:00</small>
                            </div>
                            <div class="notification-message" th:text="${notification.message}">Nội dung</div>
                            <div class="notification-meta">
                                <span th:text="${notification.statusLabel}">Chưa đọc</span>
                                <span th:if="${notification.targetOrderId != null}" th:text="${'Đơn #' + notification.targetOrderId}">Đơn</span>
                            </div>
                        </a>
                    </article>
                </div>
            </form>

            <nav class="mt-3" th:if="${notificationPage != null && notificationPage.totalPages > 1}">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item" th:classappend="${notificationPage.first} ? ' disabled' : ''">
                        <a class="page-link" th:href="@{/notifications(page=${notificationPage.number - 1})}">Trước</a>
                    </li>
                    <li class="page-item disabled"><span class="page-link" th:text="${notificationPage.number + 1 + ' / ' + notificationPage.totalPages}">1 / 1</span></li>
                    <li class="page-item" th:classappend="${notificationPage.last} ? ' disabled' : ''">
                        <a class="page-link" th:href="@{/notifications(page=${notificationPage.number + 1})}">Sau</a>
                    </li>
                </ul>
            </nav>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/site-footer :: siteFooter}"></footer>
</body>
</html>
