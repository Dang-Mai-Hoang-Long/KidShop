<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${'Giỏ hàng - ' + siteDisplayName}">Giỏ hàng - MiniWear Kids</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body class="home-page">
<header th:replace="~{fragments/site-header :: siteHeader}"></header>

<main class="pb-5">
    <div class="container pt-4">
        <div th:if="${cartSuccess}" class="alert alert-success" th:text="${cartSuccess}"></div>
        <div th:if="${cartError}" class="alert alert-danger" th:text="${cartError}"></div>

        <div class="surface-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <div>
                    <div class="section-kicker"><i class="bi bi-cart3"></i> Giỏ hàng</div>
                    <h1 class="section-title mb-0">Giỏ hàng của bạn</h1>
                </div>
                <a th:href="@{/shop}" class="link-more"><i class="bi bi-arrow-left"></i> Tiếp tục mua sắm</a>
            </div>

            <div th:if="${cartItems == null || cartItems.isEmpty()}" class="text-center py-5">
                <i class="bi bi-cart-x" style="font-size:4rem;color:#ddd;"></i>
                <p class="mt-3 text-muted fw-bold">Giỏ hàng trống</p>
                <a th:href="@{/shop}" class="btn btn-main mt-2"><i class="bi bi-shop me-1"></i> Mua sắm ngay</a>
            </div>

            <div th:unless="${cartItems == null || cartItems.isEmpty()}">
                <div class="cart-list">
                    <div class="cart-item" th:each="item : ${cartItems}">
                        <div class="cart-item-img">
                            <img th:src="${item.product.imagePath != null ? item.product.imagePath : '/assets/sales/sale1.webp'}" th:alt="${item.product.name}">
                        </div>
                        <div class="cart-item-info">
                            <a th:href="@{/product/{id}(id=${item.product.id})}" class="cart-item-name" th:text="${item.product.name}">Tên SP</a>
                            <div class="cart-item-meta">
                                <span th:if="${item.selectedSize != null}">Size: <strong th:text="${item.selectedSize}">M</strong></span>
                                <span>Đơn giá: <strong th:text="${item.product.formattedPrice}">0đ</strong></span>
                            </div>
                        </div>
                        <div class="cart-item-actions">
                            <form th:action="@{/cart/update}" method="post" class="cart-qty-form">
                                <input type="hidden" name="authCsrfToken" th:value="${authCsrfToken}">
                                <input type="hidden" name="cartItemId" th:value="${item.id}">
                                <button type="submit" name="quantity" th:value="${item.quantity - 1}" class="btn btn-sm btn-outline-main">−</button>
                                <span class="cart-qty" th:text="${item.quantity}">1</span>
                                <button type="submit" name="quantity" th:value="${item.quantity + 1}" class="btn btn-sm btn-outline-main">+</button>
                            </form>
                            <strong class="cart-item-subtotal" th:text="${item.formattedSubtotal}">0đ</strong>
                            <form th:action="@{/cart/remove}" method="post" class="m-0">
                                <input type="hidden" name="authCsrfToken" th:value="${authCsrfToken}">
                                <input type="hidden" name="cartItemId" th:value="${item.id}">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash3"></i></button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="cart-summary">
                    <div class="cart-summary-row">
                        <span>Tổng cộng:</span>
                        <strong class="cart-total-price" th:text="${formattedTotal}">0đ</strong>
                    </div>
                    <a th:href="@{/checkout}" class="btn btn-main btn-lg w-100 mt-3"><i class="bi bi-credit-card me-2"></i> Tiến hành thanh toán</a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/site-footer :: siteFooter}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
